<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Doctor Dashboard — View scheduled appointments on HealthConnect.">
  <title>Doctor Dashboard — HealthConnect</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <nav class="navbar scrolled" id="navbar">
    <div class="container">
      <a href="/" class="nav-logo">
        <svg viewBox="0 0 36 36" fill="none"><rect width="36" height="36" rx="10" fill="#6C5CE7"/><path d="M18 8v20M8 18h20" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/></svg>
        HealthConnect
      </a>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation"><span></span><span></span><span></span></button>
      <div class="nav-links" id="navLinks">
        <a href="/">Home</a>
        <a href="/symptoms.html">Symptom Checker</a>
        <a href="/doctors.html">Find Doctors</a>
        <a href="/dashboard.html" class="active">Dashboard</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">🌙</button>
        <a href="/doctors.html" class="btn-nav">Book Now</a>
      </div>
    </div>
  </nav>

  <section class="dashboard-page">
    <div class="container">
      <div class="dashboard-header">
        <div>
          <h1>📊 Doctor Dashboard</h1>
          <p style="color:var(--text-light);">View and manage scheduled appointments.</p>
        </div>
        <div style="display:flex;gap:12px;align-items:center;">
          <select class="filter-select" id="doctorSelect">
            <option value="">All Appointments</option>
          </select>
          <button class="btn btn-primary btn-sm" id="refreshBtn">↻ Refresh</button>
        </div>
      </div>

      <!-- Dashboard Stats -->
      <div class="dashboard-stats" id="dashStats">
        <div class="dash-stat-card">
          <div class="stat-label">Total Appointments</div>
          <div class="stat-value violet" id="statTotal">0</div>
        </div>
        <div class="dash-stat-card">
          <div class="stat-label">Today</div>
          <div class="stat-value cyan" id="statToday">0</div>
        </div>
        <div class="dash-stat-card">
          <div class="stat-label">Upcoming</div>
          <div class="stat-value warm" id="statUpcoming">0</div>
        </div>
      </div>

      <div id="appointmentsArea">
        <div class="loading-container">
          <div class="spinner"></div>
          <span>Loading appointments...</span>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2026 HealthConnect. Built with ❤️ for better healthcare access.</p>
      </div>
    </div>
  </footer>

  <div class="toast" id="toast"></div>
  <script src="/js/dashboard.js"></script>
</body>
</html>
